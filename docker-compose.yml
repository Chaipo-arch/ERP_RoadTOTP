version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:cached
    depends_on:
      - backend
    networks:
      - erp-network

  # Laravel Backend
  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: erp-backend
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:cached
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:cached
      - backend_vendor:/var/www/html/vendor # Ce dossier sera "natif" et ultra rapide
    depends_on:
      mysql:
        condition: service_healthy
      memcached: # Attendre que le cache soit prêt
        condition: service_started
    networks:
      - erp-network
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=erp_roadtotp
      - DB_USERNAME=erp_user
      - DB_PASSWORD=erp_password
      # Configuration Laravel pour Memcached
      - CACHE_DRIVER=memcached
      - MEMCACHED_HOST=memcached
      - PHP_IDE_CONFIG="serverName=localhost"

  # Memcached
  memcached:
    image: memcached:alpine
    container_name: erp-memcached
    networks:
      - erp-network
    # Optionnel : décommentez pour accéder au cache depuis votre hôte
    # ports:
    #   - "11211:11211"

  # React Frontend
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - erp-network
    # Note: VITE_API_URL n'est plus nécessaire, on utilise le proxy Vite avec chemin relatif

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: erp-mysql
    command: --skip-name-resolve
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: erp_roadtotp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: erp-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - mysql
    networks:
      - erp-network
  # mailserver:
  #   image: ghcr.io/docker-mailserver/docker-mailserver:latest
  #   container_name: mailserver
  #   hostname: mail
  #   domainname: mondomaine.com
  #   ports:
  #     - "25:25"    # SMTP
  #     - "143:143"  # IMAP
  #     - "587:587"  # Submission
  #     - "993:993"  # IMAPS
  #   volumes:
  #     - ./docker-data/dms/mail-data/:/var/mail/
  #     - ./docker-data/dms/mail-state/:/var/mail-state/
  #     - ./docker-data/dms/mail-logs/:/var/log/mail/
  #     - ./docker-data/dms/config/:/tmp/docker-mailserver/
  #     - /etc/localtime:/etc/localtime:ro
  #   environment:
  #     - ENABLE_SPAMASSASSIN=1
  #     - ENABLE_CLAMAV=0 # Désactivé par défaut (consomme bcp de RAM)
  #     - ENABLE_FAIL2BAN=1
  #     - SSL_TYPE=
  #     - ONE_DIR=1  # Aide à garder la config regroupée
  #   networks:
  #     - erp-network
  #     # mail : contact@mondomaine.com et mdp votre_mot_de_passe

  ollama:
    image: ollama/ollama:latest
    container_name: erp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama:/models
    environment:
      - OLLAMA_KEEP_ALIVE=5m   # garde le modèle en mémoire
    networks:
      - erp-network
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      ollama serve &
      sleep 5 &&
      if ! ollama list | grep -q test; then
        echo 'Creating model...';
        ollama create test -f /models/Modelfile;
      fi;
      wait
      "

  chromadb:
    image: chromadb/chroma:latest
    container_name: erp-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./tp_vector_db:/chroma/chroma
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - erp-network

  mcp-server:
    build:
      context: .
      dockerfile: docker/ai-agent/Dockerfile
    container_name: erp-mcp-server
    ports:
      - "8012:8000" # Permet aussi de tester depuis ton navigateur via http://localhost:8012
    volumes:
      - ./ai-agent/src:/app/src
    environment:
      - DB_HOST=mysql
      - DB_USER=erp_user
      - DB_PASSWORD=erp_password
      - DB_NAME=erp_roadtotp
      - CHROMA_HOST=chromadb
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONPATH=/app/src
    depends_on:
      - mysql
      - chromadb
    networks:
      - erp-network

  mailpit:
    image: axllent/mailpit
    container_name: mailpit_test
    restart: always
    ports:
      - "1025:1025" # Port SMTP pour envoyer le mail
      - "8025:8025" # Interface Web pour VOIR le mail
    networks:
      - erp-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: erp-onlyoffice
    ports:
      - "8081:80"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
    networks:
      - erp-network
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice


networks:
  erp-network:
    driver: bridge

volumes:
  mysql_data:
  ollama_data:
  backend_vendor:
  chromadb_data:
  onlyoffice_data:
  onlyoffice_logs: